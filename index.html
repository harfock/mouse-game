<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>鼠鼠大作戰 - 長者友善增強版</title>
    <style>
        :root {
            --bg: #000;
            --text: #FFFF00;
            --accent: #FFCC00;
            --grid-size: 5;
            --grid-px: 450px;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'PingFang HK', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header { width: 100%; padding: 15px; background: #222; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        .view { display: none; width: 95%; max-width: 600px; padding: 20px; text-align: center; box-sizing: border-box; }
        .view.active { display: block; }

        /* 模式切換器樣式 */
        .mode-switch { background: #333; padding: 15px; border-radius: 10px; margin: 10px 0; border: 2px solid var(--accent); }
        .speed-control { margin: 20px 0; background: #222; padding: 10px; border-radius: 10px; }
        input[type=range] { width: 80%; cursor: pointer; }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(var(--grid-size), 1fr);
            grid-template-rows: repeat(var(--grid-size), 1fr);
            gap: 6px;
            width: var(--grid-px);
            height: var(--grid-px);
            margin: 20px auto;
            background: #222;
            padding: 10px;
            border-radius: 10px;
        }

        .cell {
            background: #333; border-radius: 8px; display: flex; justify-content: center; align-items: center;
            cursor: pointer; font-size: calc(var(--grid-px) / var(--grid-size) * 0.65);
        }

        .cell.correct { background: #4CAF50 !important; }
        .cell.wrong { background: #F44336 !important; }
        @keyframes hitZoom { 0% { transform: scale(1); } 50% { transform: scale(2); background: white; } 100% { transform: scale(1); } }
        .hit-effect { animation: hitZoom 0.4s forwards; }

        button { background: var(--accent); color: #000; border: none; padding: 12px 25px; font-size: 1.2rem; font-weight: bold; border-radius: 10px; margin: 5px; cursor: pointer; }
        .profile-item { background: #1A1A1A; border: 3px solid var(--accent); padding: 15px; margin: 10px 0; border-radius: 12px; font-size: 1.5rem; }
        .hearts { font-size: 2rem; color: #ff4444; }
    </style>
</head>
<body>

<header>
    <div id="top-user-name">👤 <span id="current-name-display">---</span></div>
    <button onclick="toggleLanguage()" style="font-size: 0.9rem;">ZH/EN</button>
</header>

<section id="view-profile" class="view active">
    <h1>鼠鼠訓練營</h1>
    <div id="user-list-container"></div>
    <input type="text" id="name-input" placeholder="Name" style="font-size: 1.2rem; padding: 10px; width: 50%;">
    <button onclick="handleCreateUser()">新增</button>
</section>

<section id="view-lobby" class="view">
    <h2 class="lang" data-zh="遊戲設定" data-en="Game Lobby">遊戲設定</h2>
    
    <div class="mode-switch">
        <label style="font-size: 1.5rem; display: block; margin-bottom: 10px;">
            <input type="checkbox" id="elderly-mode-chk" style="transform: scale(2); margin-right: 15px;">
            <span class="lang" data-zh="長者模式 (更輕鬆)" data-en="Elderly Mode (Easier)">長者模式 (更輕鬆)</span>
        </label>
    </div>

    <div class="speed-control">
        <label class="lang" data-zh="老鼠移動速度" data-en="Mouse Movement Speed">老鼠移動速度</label><br>
        <input type="range" id="speed-range" min="300" max="1500" value="800" step="100">
        <div style="display: flex; justify-content: space-between; font-size: 0.8rem; width: 80%; margin: auto;">
            <span class="lang" data-zh="快" data-en="Fast">快</span>
            <span class="lang" data-zh="慢" data-en="Slow">慢</span>
        </div>
    </div>

    <button onclick="initGame1()" style="width: 80%;">⚡ <span class="lang" data-zh="捕鼠特攻" data-en="Rat Catcher">捕鼠特攻</span></button>
    <button onclick="initGame2()" style="width: 80%;">🧠 <span class="lang" data-zh="老鼠迷蹤" data-en="Mouse Maze">老鼠迷蹤</span></button>
</section>

<section id="view-game1" class="view">
    <div style="font-size: 1.5rem;">Score: <span id="g1-score">0</span></div>
    <div id="g1-grid" class="game-grid"></div>
    <button onclick="quitGame()">Exit</button>
</section>

<section id="view-game2" class="view">
    <div id="g2-lives-display" class="hearts">❤️❤️❤️</div>
    <div style="margin-bottom: 10px;" id="g2-level-text">Level 1</div>
    <div id="g2-grid" class="game-grid"></div>
    <button onclick="quitGame()">Exit</button>
</section>

<script>
let appState = {
    lang: 'zh',
    users: JSON.parse(localStorage.getItem('mouse_v2_data') || '[]'),
    currentUser: null,
    g1Active: false
};

function showView(viewId) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(`view-${viewId}`).classList.add('active');
    appState.g1Active = (viewId === 'game1');
}

function toggleLanguage() {
    appState.lang = appState.lang === 'zh' ? 'en' : 'zh';
    document.querySelectorAll('.lang').forEach(el => { el.innerText = el.getAttribute(`data-${appState.lang}`); });
}

/* --- 用戶管理 --- */
function refreshUserList() {
    const container = document.getElementById('user-list-container');
    container.innerHTML = appState.users.map((u, i) => `<div class="profile-item" onclick="selectUser(${i})">👤 ${u.name}</div>`).join('');
}
function handleCreateUser() {
    const input = document.getElementById('name-input');
    if (!input.value) return;
    appState.users.push({ name: input.value });
    localStorage.setItem('mouse_v2_data', JSON.stringify(appState.users));
    input.value = ''; refreshUserList();
}
function selectUser(i) {
    appState.currentUser = appState.users[i];
    document.getElementById('current-name-display').innerText = appState.currentUser.name;
    showView('lobby');
}

/* --- Game 1: 捕鼠特攻 --- */
let g1Data = { score: 0, gridSize: 5, timer: null };
function initGame1() {
    g1Data.score = 0; g1Data.gridSize = 5;
    showView('game1'); runG1Cycle();
}
function runG1Cycle() {
    if (!appState.g1Active) return;
    const grid = document.getElementById('g1-grid');
    grid.style.setProperty('--grid-size', g1Data.gridSize);
    grid.innerHTML = '';
    const isElderly = document.getElementById('elderly-mode-chk').checked;

    for (let i=0; i<g1Data.gridSize**2; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.onclick = () => {
            if (cell.innerText === '🐀') {
                cell.classList.add('hit-effect'); g1Data.score += 10;
                if (g1Data.score % 100 === 0 && g1Data.gridSize < 10) g1Data.gridSize++;
                document.getElementById('g1-score').innerText = g1Data.score;
                clearTimeout(g1Data.timer); setTimeout(runG1Cycle, 400);
            }
        };
        grid.appendChild(cell);
    }
    const cells = grid.querySelectorAll('.cell');
    cells[Math.floor(Math.random() * cells.length)].innerText = '🐀';
    
    // 長者模式 10 秒，普通模式 1.5 秒起隨難度縮短
    let delay = isElderly ? 10000 : Math.max(700, 1500 - (g1Data.gridSize * 100));
    g1Data.timer = setTimeout(() => { if (appState.g1Active) runG1Cycle(); }, delay);
}

/* --- Game 2: 老鼠迷蹤 --- */
let g2Data = { level: 1, size: 5, lives: 3, path: [], playerIdx: 0, isShowing: false };
function initGame2() {
    g2Data.level = 1; g2Data.size = 5;
    showView('game2'); startG2Level();
}
async function startG2Level() {
    g2Data.isShowing = true; g2Data.playerIdx = 0;
    const isElderly = document.getElementById('elderly-mode-chk').checked;
    const speed = parseInt(document.getElementById('speed-range').value);

    // 計算重試次數
    let routeLen = g2Data.level + 3;
    if (isElderly) {
        g2Data.lives = g2Data.size * g2Data.size; // 最大格子數
    } else {
        g2Data.lives = Math.max(2, Math.floor(routeLen * 0.2)); // 20% 路徑長度，最小 2
    }

    const grid = document.getElementById('g2-grid');
    grid.style.setProperty('--grid-size', g2Data.size);
    grid.innerHTML = '';
    document.getElementById('g2-lives-display').innerText = isElderly ? "♾️" : "❤️".repeat(g2Data.lives);
    document.getElementById('g2-level-text').innerText = `Level ${g2Data.level} (Lives: ${g2Data.lives})`;

    for (let i=0; i<g2Data.size**2; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.dataset.pos = `${Math.floor(i/g2Data.size)}-${i%g2Data.size}`;
        grid.appendChild(cell);
    }

    // 生成路徑
    g2Data.path = ["0-0"];
    let curr = {x:0, y:0};
    for (let s=0; s<routeLen; s++) {
        let n = [{x:curr.x+1, y:curr.y}, {x:curr.x-1, y:curr.y}, {x:curr.x, y:curr.y+1}, {x:curr.x, y:curr.y-1}]
                .filter(p => p.x>=0 && p.x<g2Data.size && p.y>=0 && p.y<g2Data.size && !g2Data.path.includes(`${p.x}-${p.y}`));
        if (n.length === 0) break;
        curr = n[Math.floor(Math.random()*n.length)];
        g2Data.path.push(`${curr.x}-${curr.y}`);
    }

    // 播放
    for (let p of g2Data.path) {
        let target = grid.querySelector(`[data-pos="${p}"]`);
        target.innerText = '🐀';
        await new Promise(r => setTimeout(r, speed)); // 使用拉桿速度
        target.innerText = '';
    }
    g2Data.isShowing = false;
    setupG2Input();
}

function setupG2Input() {
    const grid = document.getElementById('g2-grid');
    grid.querySelectorAll('.cell').forEach(c => {
        c.onclick = () => {
            if (g2Data.isShowing) return;
            if (c.dataset.pos === g2Data.path[g2Data.playerIdx]) {
                c.innerText = '🐀'; c.classList.add('correct');
                g2Data.playerIdx++;
                if (g2Data.playerIdx === g2Data.path.length) {
                    g2Data.level++;
                    if (g2Data.level % 3 === 0 && g2Data.size < 10) g2Data.size++;
                    setTimeout(startG2Level, 800);
                }
            } else {
                g2Data.lives--;
                c.classList.add('wrong');
                document.getElementById('g2-lives-display').innerText = g2Data.lives > 10 ? "♾️" : "❤️".repeat(g2Data.lives);
                setTimeout(() => {
                    c.classList.remove('wrong');
                    if (g2Data.lives <= 0) { alert("Try Again!"); startG2Level(); }
                }, 400);
            }
        };
    });
}

function quitGame() { appState.g1Active = false; clearTimeout(g1Data.timer); showView('lobby'); }
window.onload = () => { refreshUserList(); toggleLanguage(); };
</script>
</body>
</html>
