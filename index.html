<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>鼠鼠訓練營 - 完整專業版</title>
    <style>
        :root {
            --bg: #000;
            --text: #FFFF00;
            --accent: #FFCC00;
            /* 核心：鎖定 80vmin，確保在任何手機螢幕都不會超出、不需捲動 */
            --grid-px: 80vmin; 
            --grid-size: 5;
        }

        * { touch-action: manipulation; box-sizing: border-box; }

        body {
            background-color: var(--bg); color: var(--text);
            font-family: 'PingFang HK', sans-serif;
            margin: 0; padding: 0; overflow: hidden; /* 徹底禁用捲軸 */
            display: flex; flex-direction: column; align-items: center; height: 100vh;
        }

        header { 
            width: 100%; height: 60px; padding: 0 15px; background: #222; border-bottom: 2px solid var(--accent);
            display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;
        }

        /* 視圖控制：強制內容居中且不溢出 */
        .view { display: none; width: 100%; flex-grow: 1; padding: 10px; text-align: center; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        .view.active { display: flex; }

        /* --- 規則與卡片 --- */
        .rule-card { background: #111; border-left: 5px solid var(--accent); padding: 12px; margin: 10px; text-align: left; font-size: 0.95rem; width: 90%; max-width: 400px; color: #EEE; }
        .hint-text { font-size: 0.9rem; color: #BBB; margin-bottom: 8px; font-weight: bold; }

        /* --- 用戶列表樣式 --- */
        .profile-item { 
            background: #111; border: 1px solid var(--accent); padding: 12px; margin: 6px; 
            width: 90%; max-width: 400px; border-radius: 12px; 
            display: flex; justify-content: space-between; align-items: center; 
        }

        /* --- 網格系統：完美正方形 + Emoji 縮放 --- */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(var(--grid-size), 1fr);
            grid-template-rows: repeat(var(--grid-size), 1fr);
            gap: 5px;
            width: var(--grid-px);
            height: var(--grid-px);
            background: #222; padding: 8px; border-radius: 10px;
        }

        .cell {
            background: #333; border-radius: 6px;
            display: flex; justify-content: center; align-items: center;
            /* Emoji 大小鎖定為格子的 60%，絕不撐破網格 */
            font-size: calc(var(--grid-px) / var(--grid-size) * 0.6);
            aspect-ratio: 1 / 1;
            user-select: none;
        }

        /* --- 進度條 --- */
        .progress-wrapper { width: 80%; max-width: 400px; background: #333; height: 18px; border-radius: 10px; margin: 10px 0; overflow: hidden; border: 1px solid var(--accent); }
        .bar-fill { height: 100%; background: var(--accent); width: 0%; transition: 0.3s; }

        /* --- 彈窗 (Modal) --- */
        #game-picker-modal { 
            display:none; position:fixed; top:0; left:0; width:100%; height:100%; 
            background:rgba(0,0,0,0.95); z-index:999; flex-direction:column; 
            align-items:center; justify-content:center; 
        }

        /* 按鈕視覺 */
        button { background: var(--accent); color: #000; border: none; padding: 12px 20px; font-size: 1rem; font-weight: bold; border-radius: 10px; margin: 5px; cursor: pointer; }
        button:active { filter: brightness(0.8); }
        .btn-sm { padding: 6px 12px; font-size: 0.85rem; margin: 0 2px; }
        .btn-delete { background: #b22222; color: #fff; }
        .btn-edit { background: #555; color: #fff; }

        /* 特效 */
        .hit-effect { background: #FFF !important; transform: scale(1.05); }
        .correct { background: #4CAF50 !important; }
        .wrong { background: #F44336 !important; }
    </style>
</head>
<body>

<header>
    <div>👤 <span id="current-name-display">---</span></div>
    <button onclick="toggleLanguage()" class="btn-sm">ZH / EN</button>
</header>

<section id="view-profile" class="view active">
    <h2 class="lang" data-zh="鼠鼠訓練營" data-en="Mouse Academy">鼠鼠訓練營</h2>
    
    <div class="rule-card">
        <strong class="lang" data-zh="📖 如何開始：" data-en="📖 Instructions:">📖 如何開始：</strong><br>
        <span class="lang" data-zh="1. 新增名字 2. 點擊 ▶️ 開始 3. 選擇遊戲項目" data-en="1. Add Name 2. Tap ▶️ to Start 3. Pick a Game">1. 新增名字 2. 點擊 ▶️ 開始 3. 選擇遊戲項目</span>
    </div>

    <div id="user-list-container" style="width: 100%; display: flex; flex-direction: column; align-items: center;"></div>

    <div style="margin-top: 20px; background: #111; padding: 15px; border-radius: 15px; border: 1px dashed #555;">
        <input type="text" id="name-input" placeholder="Name..." style="padding: 10px; font-size: 1rem; width: 130px; border-radius: 8px; border: none; background: #222; color: #fff;">
        <button onclick="handleCreateUser()" class="lang" data-zh="新增" data-en="Add">新增</button>
    </div>
</section>

<div id="game-picker-modal">
    <h3 class="lang" data-zh="請選擇訓練項目" data-en="Select Training">請選擇訓練項目</h3>
    <button onclick="pickGame(1)" style="width: 80%; max-width: 280px; padding: 25px; font-size: 1.4rem; margin-bottom: 15px;">⚡ 捕鼠特攻</button>
    <button onclick="pickGame(2)" style="width: 80%; max-width: 280px; padding: 25px; font-size: 1.4rem; background: #4CAF50; color: #fff;">🧠 老鼠迷蹤</button>
    <button onclick="closePicker()" style="background:none; color:#999; text-decoration:underline; margin-top:20px;">取消 / Cancel</button>
</div>

<section id="view-game1" class="view">
    <div class="hint-text lang" data-zh="💡 只點 🐀，無視其他動物！" data-en="💡 Hit 🐀 only!">💡 只點 🐀，無視其他動物！</div>
    <div><label><input type="checkbox" id="g1-elderly-chk"> 長者模式</label> | Score: <span id="g1-score">0</span></div>
    <div class="progress-wrapper"><div id="bar-fill-g1" class="bar-fill"></div></div>
    <div id="g1-grid" class="game-grid"></div>
    <button onclick="quitGame()">返回大廳</button>
</section>

<section id="view-game2" class="view">
    <div id="g2-hint" class="hint-text">💡 記住路徑...</div>
    <div><label><input type="checkbox" id="g2-elderly-chk"> 長者模式</label> | <span id="g2-lives-display">❤️❤️❤️</span></div>
    <div class="progress-wrapper"><div id="bar-fill-g2" class="bar-fill"></div></div>
    <div id="g2-grid" class="game-grid"></div>
    <button onclick="quitGame()">返回大廳</button>
</section>

<script>
/* --- 核心邏輯與用戶管理 --- */
let appState = { lang: 'zh', users: JSON.parse(localStorage.getItem('mouse_final_v16') || '[]'), g1Active: false };
const decoys = ['🐹', '🐰', '🐥', '🐱', '🐶'];

function toggleLanguage() {
    appState.lang = appState.lang === 'zh' ? 'en' : 'zh';
    document.querySelectorAll('.lang').forEach(el => { el.innerText = el.getAttribute(`data-${appState.lang}`); });
}

function showView(id) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(`view-${id}`).classList.add('active');
    appState.g1Active = (id === 'game1');
}

function refreshUserList() {
    const container = document.getElementById('user-list-container');
    container.innerHTML = appState.users.map((u, i) => `
        <div class="profile-item">
            <span style="font-weight:bold; font-size:1.1rem;">👤 ${u.name}</span>
            <div>
                <button onclick="editUser(${i})" class="btn-sm btn-edit">✏️</button>
                <button onclick="deleteUser(${i})" class="btn-sm btn-delete">🗑️</button>
                <button onclick="openPicker(${i})" class="btn-sm" style="background:#FFCC00; color:#000;">▶️ 開始</button>
            </div>
        </div>
    `).join('');
}

function handleCreateUser() {
    const input = document.getElementById('name-input');
    if (!input.value.trim()) return;
    appState.users.push({ name: input.value.trim() });
    saveAndRefresh();
    input.value = '';
}

function editUser(i) {
    const n = prompt("修改名字 / Edit Name:", appState.users[i].name);
    if (n && n.trim()) { appState.users[i].name = n.trim(); saveAndRefresh(); }
}

function deleteUser(i) {
    if (confirm("確定刪除？ Delete?")) { appState.users.splice(i, 1); saveAndRefresh(); }
}

function saveAndRefresh() {
    localStorage.setItem('mouse_final_v16', JSON.stringify(appState.users));
    refreshUserList();
}

/* --- 彈窗選擇 --- */
function openPicker(i) {
    document.getElementById('current-name-display').innerText = appState.users[i].name;
    document.getElementById('game-picker-modal').style.display = 'flex';
}
function closePicker() { document.getElementById('game-picker-modal').style.display = 'none'; }
function pickGame(n) { closePicker(); n === 1 ? initGame1() : initGame2(); }

/* --- Game 1 --- */
let g1Data = { score: 0, gridSize: 5, timer: null };
function initGame1() { g1Data.score = 0; g1Data.gridSize = 5; showView('game1'); runG1Cycle(); }
function runG1Cycle() {
    if (!appState.g1Active) return;
    clearTimeout(g1Data.timer);
    const grid = document.getElementById('g1-grid');
    document.documentElement.style.setProperty('--grid-size', g1Data.gridSize);
    grid.innerHTML = '';
    document.getElementById('g1-score').innerText = g1Data.score;
    document.getElementById('bar-fill-g1').style.width = (g1Data.score % 100) + "%";
    for (let i=0; i<g1Data.gridSize**2; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.onclick = (e) => {
            e.preventDefault();
            if (cell.innerText === '🐀') {
                cell.classList.add('hit-effect'); g1Data.score += 10;
                if (g1Data.score > 0 && g1Data.score % 100 === 0 && g1Data.gridSize < 9) g1Data.gridSize++;
                clearTimeout(g1Data.timer); setTimeout(runG1Cycle, 200);
            }
        };
        grid.appendChild(cell);
    }
    const cells = grid.querySelectorAll('.cell');
    cells[Math.floor(Math.random() * cells.length)].innerText = '🐀';
    for(let d=0; d<Math.floor(g1Data.gridSize*1.2); d++){
        let idx = Math.floor(Math.random()*cells.length);
        if(cells[idx].innerText === '') cells[idx].innerText = decoys[Math.floor(Math.random()*decoys.length)];
    }
    const isElderly = document.getElementById('g1-elderly-chk').checked;
    let delay = isElderly ? 8000 : Math.max(900, 1800 - (g1Data.gridSize * 120));
    g1Data.timer = setTimeout(() => { if (appState.g1Active) runG1Cycle(); }, delay);
}

/* --- Game 2 --- */
let g2Data = { level: 1, size: 5, path: [], playerIdx: 0, isShowing: false };
function initGame2() { g2Data.level = 1; g2Data.size = 5; showView('game2'); startG2Level(); }
async function startG2Level() {
    g2Data.playerIdx = 0; g2Data.isShowing = true;
    const isElderly = document.getElementById('g2-elderly-chk').checked;
    const grid = document.getElementById('g2-grid');
    document.documentElement.style.setProperty('--grid-size', g2Data.size);
    grid.innerHTML = '';
    document.getElementById('g2-lives-display').innerText = isElderly ? "♾️" : "❤️❤️❤️";
    document.getElementById('bar-fill-g2').style.width = ((g2Data.level % 5) * 20) + "%";
    for (let i=0; i<g2Data.size**2; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell'; cell.dataset.pos = `${Math.floor(i/g2Data.size)}-${i%g2Data.size}`;
        grid.appendChild(cell);
    }
    g2Data.path = ["0-0"];
    let curr = {x:0, y:0};
    for (let s=0; s<(g2Data.level+3); s++) {
        let n = [{x:curr.x+1, y:curr.y}, {x:curr.x-1, y:curr.y}, {x:curr.x, y:curr.y+1}, {x:curr.x, y:curr.y-1}]
                .filter(p => p.x>=0 && p.x<g2Data.size && p.y>=0 && p.y<g2Data.size && !g2Data.path.includes(`${p.x}-${p.y}`));
        if (n.length === 0) break;
        curr = n[Math.floor(Math.random()*n.length)]; g2Data.path.push(`${curr.x}-${curr.y}`);
    }
    document.getElementById('g2-hint').innerText = "👀 ...";
    for (let p of g2Data.path) {
        let t = grid.querySelector(`[data-pos="${p}"]`);
        if(t) { t.innerText = '🐀'; await new Promise(r => setTimeout(r, 800)); t.innerText = ''; }
    }
    document.getElementById('g2-hint').innerText = "👉 GO!";
    g2Data.isShowing = false;
    document.querySelectorAll('#g2-grid .cell').forEach(c => {
        c.onclick = () => {
            if (g2Data.isShowing) return;
            if (c.dataset.pos === g2Data.path[g2Data.playerIdx]) {
                c.innerText = '🐀'; c.classList.add('correct'); g2Data.playerIdx++;
                if (g2Data.playerIdx === g2Data.path.length) {
                    g2Data.level++; if (g2Data.level % 3 === 0 && g2Data.size < 9) g2Data.size++;
                    setTimeout(startG2Level, 600);
                }
            } else {
                c.classList.add('wrong'); setTimeout(() => { c.classList.remove('wrong'); startG2Level(); }, 300);
            }
        };
    });
}

function quitGame() { appState.g1Active = false; clearTimeout(g1Data.timer); showView('profile'); }
window.onload = () => { refreshUserList(); };
</script>
</body>
</html>
