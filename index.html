<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>鼠鼠大作戰 - 專業穩定版</title>
    <style>
        :root {
            --bg: #000;
            --text: #FFFF00;
            --accent: #FFCC00;
            /* 核心佈局單位：取螢幕寬或高較小者的 80%，確保不溢出 */
            --grid-px: 80vmin; 
            --grid-size: 5;
        }

        * { touch-action: manipulation; box-sizing: border-box; }

        body {
            background-color: var(--bg); color: var(--text);
            font-family: 'PingFang HK', 'Microsoft JhengHei', sans-serif;
            margin: 0; padding: 0; overflow: hidden; /* 強制禁止捲動 */
            display: flex; flex-direction: column; align-items: center; height: 100vh;
        }

        header { 
            width: 100%; height: 60px; padding: 0 15px; background: #222; border-bottom: 2px solid var(--accent);
            display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;
        }

        .view { display: none; width: 100%; flex-grow: 1; padding: 10px; text-align: center; flex-direction: column; align-items: center; justify-content: center; }
        .view.active { display: flex; }

        /* --- 規則與文字 --- */
        .rule-card { background: #111; border: 1px solid var(--accent); padding: 10px; margin: 8px; text-align: left; font-size: 0.95rem; width: 90%; max-width: 400px; color: #EEE; }
        .hint-text { font-size: 0.9rem; color: #BBB; margin-bottom: 10px; font-weight: bold; }

        /* --- 進度條 --- */
        .progress-wrapper { width: 80%; max-width: 400px; background: #333; height: 18px; border-radius: 10px; margin: 8px 0; position: relative; overflow: hidden; border: 1px solid var(--accent); }
        .bar-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.3s; }

        /* --- 核心網格系統 (防變形) --- */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(var(--grid-size), 1fr);
            grid-template-rows: repeat(var(--grid-size), 1fr);
            gap: 5px;
            width: var(--grid-px);
            height: var(--grid-px);
            background: #222; padding: 8px; border-radius: 10px;
        }

        .cell {
            background: #333; border-radius: 6px;
            display: flex; justify-content: center; align-items: center;
            /* Emoji 大小根據格數動態縮放，不超過格子 */
            font-size: calc(var(--grid-px) / var(--grid-size) * 0.6);
            aspect-ratio: 1 / 1;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }

        /* --- 按鈕與輸入 --- */
        button { background: var(--accent); color: #000; border: none; padding: 12px 24px; font-size: 1.1rem; font-weight: bold; border-radius: 10px; margin: 8px; cursor: pointer; }
        button:active { background: #D4AF37; }
        .profile-item { background: #111; border: 2px solid var(--accent); padding: 15px; margin: 8px; width: 80%; max-width: 300px; border-radius: 10px; font-size: 1.3rem; }
        
        .hearts { font-size: 1.8rem; color: #ff4444; }
        input[type=range] { width: 120px; vertical-align: middle; }
        input[type=checkbox] { transform: scale(1.6); margin-right: 8px; }

        /* 特效碼 */
        .hit-effect { background: #FFF !important; transform: scale(1.05); transition: 0.1s; }
        .correct { background: #4CAF50 !important; }
        .wrong { background: #F44336 !important; }
    </style>
</head>
<body>

<header>
    <div id="top-user-name">👤 <span id="current-name-display">---</span></div>
    <button onclick="toggleLanguage()" style="font-size: 0.8rem; padding: 5px 10px;">ZH / EN</button>
</header>

<section id="view-profile" class="view active">
    <h1 class="lang" data-zh="鼠鼠訓練營" data-en="Mouse Academy">鼠鼠訓練營</h1>
    
    <div class="rule-card" style="border-left: 5px solid #FFCC00; background: #222;">
        <p style="margin: 5px 0;"><strong>📖 如何開始：</strong></p>
        <ol style="padding-left: 20px; text-align: left; font-size: 0.9rem;">
            <li>在下方新增或選擇你的用戶。</li>
            <li>點擊用戶旁的 ▶️ 按鈕。</li>
            <li>選擇 ⚡ (反應) 或 🧠 (記憶) 進行訓練。</li>
        </ol>
    </div>

    <div id="user-list-container" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
        </div>

    <div style="margin-top: 20px; padding: 15px; background: #111; border-radius: 12px; border: 1px dashed #555;">
        <input type="text" id="name-input" placeholder="輸入名字..." style="padding: 10px; font-size: 1.1rem; width: 140px; border-radius: 8px; border: none; background: #222; color: #fff;">
        <button onclick="handleCreateUser()" class="lang" data-zh="新增用戶" data-en="Add User">新增用戶</button>
    </div>
</section>

<div id="game-picker-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:999; flex-direction:column; align-items:center; justify-content:center;">
    <h2 class="lang" data-zh="請選擇訓練項目" data-en="Select Training">請選擇訓練項目</h2>
    <button onclick="pickGame(1)" style="width: 80%; max-width: 300px; padding: 20px; font-size: 1.5rem;">⚡ 捕鼠特攻</button>
    <button onclick="pickGame(2)" style="width: 80%; max-width: 300px; padding: 20px; font-size: 1.5rem; background: #4CAF50; color: white;">🧠 老鼠迷蹤</button>
    <button onclick="closePicker()" style="background:none; color:#999; text-decoration:underline; margin-top:20px;">取消</button>
</div>


<section id="view-lobby" class="view">
    <div class="rule-card">
        <strong class="lang" data-zh="⚡ 捕鼠特攻：" data-en="⚡ Rat Catcher:">⚡ 捕鼠特攻：</strong>
        <span class="lang" data-zh="看到 🐀 就點！別理會 🐹🐰🐥。" data-en="Hit 🐀, ignore others.">看到 🐀 就點！別理會 🐹🐰🐥。</span>
    </div>
    <button onclick="initGame1()" style="width: 80%;">開始捕鼠</button>
    
    <div class="rule-card">
        <strong class="lang" data-zh="🧠 老鼠迷蹤：" data-en="🧠 Mouse Maze:">🧠 老鼠迷蹤：</strong>
        <span class="lang" data-zh="記住路徑，消失後按順序點擊。" data-en="Repeat the path after it's gone.">記住路徑，消失後按順序點擊。</span>
    </div>
    <button onclick="initGame2()" style="width: 80%;">開始記憶</button>
    <button onclick="showView('profile')" style="background: #333; color: #ccc; font-size: 0.9rem;">切換用戶</button>
</section>

<section id="view-game1" class="view">
    <div style="background: #1A1A1A; padding: 10px; width: 90%; border-radius: 10px; margin-bottom: 10px;">
        <label><input type="checkbox" id="g1-elderly-chk"> <span class="lang" data-zh="長者模式" data-en="Elderly Mode">長者模式</span></label>
        | Score: <span id="g1-score">0</span>
        <div class="hint-text lang" data-zh="💡 只點 🐀，無視其他動物！" data-en="💡 Hit 🐀 only!">💡 只點 🐀，無視其他動物！</div>
    </div>
    <div class="progress-wrapper"><div id="bar-fill-g1" class="bar-fill"></div></div>
    <div id="g1-grid" class="game-grid"></div>
    <button onclick="quitGame()">返回</button>
</section>

<section id="view-game2" class="view">
    <div style="background: #1A1A1A; padding: 10px; width: 90%; border-radius: 10px; margin-bottom: 10px;">
        <label><input type="checkbox" id="g2-elderly-chk"> <span class="lang" data-zh="長者模式" data-en="Elderly Mode">長者模式</span></label>
        | <span id="g2-lives-display" class="hearts">❤️❤️❤️</span>
        <div style="margin-top: 5px;">速度: <input type="range" id="g2-speed-range" min="300" max="1500" value="800"></div>
        <div id="g2-hint" class="hint-text">💡 記住路徑...</div>
    </div>
    <div class="progress-wrapper"><div id="bar-fill-g2" class="bar-fill"></div></div>
    <div id="g2-grid" class="game-grid"></div>
    <button onclick="quitGame()">返回</button>
</section>

<script>
let appState = { lang: 'zh', users: JSON.parse(localStorage.getItem('mouse_final_v14') || '[]'), g1Active: false };
const decoys = ['🐹', '🐰', '🐥', '🐱', '🐶'];

function showView(id) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(`view-${id}`).classList.add('active');
    appState.g1Active = (id === 'game1');
}

function toggleLanguage() {
    appState.lang = appState.lang === 'zh' ? 'en' : 'zh';
    document.querySelectorAll('.lang').forEach(el => { el.innerText = el.getAttribute(`data-${appState.lang}`); });
}

/* --- 🛠️ 用戶管理與遊戲彈窗邏輯 --- */

function refreshUserList() {
    const container = document.getElementById('user-list-container');
    container.innerHTML = appState.users.map((u, i) => `
        <div class="profile-item" style="display: flex; justify-content: space-between; align-items: center; width: 90%; max-width: 400px;">
            <span style="flex-grow: 1; text-align: left; overflow: hidden; text-overflow: ellipsis;">👤 ${u.name}</span>
            <div style="display: flex; gap: 10px;">
                <button onclick="editUser(${i})" style="padding: 5px 10px; font-size: 0.9rem; background: #555; color: #fff; margin: 0;">✏️</button>
                <button onclick="deleteUser(${i})" style="padding: 5px 10px; font-size: 0.9rem; background: #b22222; color: #fff; margin: 0;">🗑️</button>
                <button onclick="openPicker(${i})" style="padding: 5px 15px; font-size: 1.1rem; background: #FFCC00; color: #000; margin: 0; font-weight: bold;">▶️</button>
            </div>
        </div>
    `).join('');
}

function handleCreateUser() {
    const input = document.getElementById('name-input');
    if (!input.value.trim()) return;
    appState.users.push({ name: input.value.trim() });
    saveAndRefresh();
    input.value = '';
}

function editUser(index) {
    const newName = prompt(appState.lang === 'zh' ? "修改用戶名稱：" : "Edit User Name:", appState.users[index].name);
    if (newName && newName.trim()) {
        appState.users[index].name = newName.trim();
        saveAndRefresh();
    }
}

function deleteUser(index) {
    const confirmMsg = appState.lang === 'zh' ? "確定要刪除此用戶嗎？" : "Delete this user?";
    if (confirm(confirmMsg)) {
        appState.users.splice(index, 1);
        saveAndRefresh();
    }
}

function saveAndRefresh() {
    localStorage.setItem('mouse_final_v14', JSON.stringify(appState.users));
    refreshUserList();
}

/* --- 彈窗選擇邏輯 --- */
let selectedUserIndex = null;

function openPicker(index) {
    selectedUserIndex = index;
    document.getElementById('current-name-display').innerText = appState.users[index].name;
    document.getElementById('game-picker-modal').style.display = 'flex';
}

function closePicker() {
    document.getElementById('game-picker-modal').style.display = 'none';
}

function pickGame(gameNum) {
    closePicker();
    if (gameNum === 1) initGame1();
    if (gameNum === 2) initGame2();
}

}

/* --- Game 1 --- */
let g1Data = { score: 0, gridSize: 5, timer: null };
function initGame1() { g1Data.score = 0; g1Data.gridSize = 5; showView('game1'); runG1Cycle(); }
function runG1Cycle() {
    if (!appState.g1Active) return;
    clearTimeout(g1Data.timer);
    const grid = document.getElementById('g1-grid');
    document.documentElement.style.setProperty('--grid-size', g1Data.gridSize);
    grid.innerHTML = '';
    document.getElementById('g1-score').innerText = g1Data.score;
    document.getElementById('bar-fill-g1').style.width = (g1Data.score % 100) + "%";

    for (let i=0; i<g1Data.gridSize**2; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.onclick = (e) => {
            e.preventDefault();
            if (cell.innerText === '🐀') {
                cell.classList.add('hit-effect'); g1Data.score += 10;
                if (g1Data.score > 0 && g1Data.score % 100 === 0 && g1Data.gridSize < 9) g1Data.gridSize++;
                clearTimeout(g1Data.timer); setTimeout(runG1Cycle, 200);
            }
        };
        grid.appendChild(cell);
    }
    const cells = grid.querySelectorAll('.cell');
    cells[Math.floor(Math.random() * cells.length)].innerText = '🐀';
    let count = Math.floor(g1Data.gridSize * 1.3);
    for(let d=0; d<count; d++) {
        let idx = Math.floor(Math.random() * cells.length);
        if(cells[idx].innerText === '') cells[idx].innerText = decoys[Math.floor(Math.random()*decoys.length)];
    }
    const isElderly = document.getElementById('g1-elderly-chk').checked;
    // 鎖定最低 900ms，防止消失太快
    let delay = isElderly ? 8000 : Math.max(900, 1800 - (g1Data.gridSize * 120));
    g1Data.timer = setTimeout(() => { if (appState.g1Active) runG1Cycle(); }, delay);
}

/* --- Game 2 --- */
let g2Data = { level: 1, size: 5, lives: 3, path: [], playerIdx: 0, isShowing: false };
function initGame2() { g2Data.level = 1; g2Data.size = 5; showView('game2'); startG2Level(); }
async function startG2Level() {
    g2Data.playerIdx = 0; g2Data.isShowing = true;
    const isElderly = document.getElementById('g2-elderly-chk').checked;
    const speed = parseInt(document.getElementById('g2-speed-range').value);
    g2Data.lives = isElderly ? 99 : Math.max(2, Math.floor((g2Data.level + 3) * 0.2));

    const grid = document.getElementById('g2-grid');
    document.documentElement.style.setProperty('--grid-size', g2Data.size);
    grid.innerHTML = '';
    document.getElementById('g2-lives-display').innerText = isElderly ? "♾️" : "❤️".repeat(g2Data.lives);
    document.getElementById('bar-fill-g2').style.width = ((g2Data.level % 5) * 20) + "%";

    for (let i=0; i<g2Data.size**2; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell'; cell.dataset.pos = `${Math.floor(i/g2Data.size)}-${i%g2Data.size}`;
        grid.appendChild(cell);
    }

    g2Data.path = ["0-0"];
    let curr = {x:0, y:0};
    for (let s=0; s<(g2Data.level+3); s++) {
        let n = [{x:curr.x+1, y:curr.y}, {x:curr.x-1, y:curr.y}, {x:curr.x, y:curr.y+1}, {x:curr.x, y:curr.y-1}]
                .filter(p => p.x>=0 && p.x<g2Data.size && p.y>=0 && p.y<g2Data.size && !g2Data.path.includes(`${p.x}-${p.y}`));
        if (n.length === 0) break;
        curr = n[Math.floor(Math.random()*n.length)]; g2Data.path.push(`${curr.x}-${curr.y}`);
    }

    document.getElementById('g2-hint').innerText = appState.lang==='zh'?"👀 觀察路徑...":"👀 Watch path...";
    for (let p of g2Data.path) {
        let target = grid.querySelector(`[data-pos="${p}"]`);
        if(target) { target.innerText = '🐀'; await new Promise(r => setTimeout(r, speed)); target.innerText = ''; }
    }
    document.getElementById('g2-hint').innerText = appState.lang==='zh'?"👉 請按順序點擊！":"👉 Tap the path!";
    g2Data.isShowing = false;
    document.querySelectorAll('#g2-grid .cell').forEach(c => {
        c.onclick = (e) => {
            e.preventDefault();
            if (g2Data.isShowing) return;
            if (c.dataset.pos === g2Data.path[g2Data.playerIdx]) {
                c.innerText = '🐀'; c.classList.add('correct'); g2Data.playerIdx++;
                if (g2Data.playerIdx === g2Data.path.length) {
                    g2Data.level++; if (g2Data.level % 3 === 0 && g2Data.size < 9) g2Data.size++;
                    setTimeout(startG2Level, 600);
                }
            } else {
                g2Data.lives--; c.classList.add('wrong');
                document.getElementById('g2-lives-display').innerText = isElderly ? "♾️" : "❤️".repeat(Math.max(0, g2Data.lives));
                setTimeout(() => { c.classList.remove('wrong'); if (g2Data.lives <= 0) startG2Level(); }, 300);
            }
        };
    });
}

function quitGame() { appState.g1Active = false; clearTimeout(g1Data.timer); showView('lobby'); }
window.onload = () => { refreshUserList(); toggleLanguage(); };
</script>
</body>
</html>
