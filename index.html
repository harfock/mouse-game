<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>鼠鼠訓練營 - 完整專業版</title>
    <style>
       :root {
            /* Pro-Gamer Color Palette */
            --bg: radial-gradient(circle at center, #1a1a2e 0%, #0f0f1a 100%);
            --card-bg: rgba(255, 255, 255, 0.08);
            --text: #ffffff;
            --accent: #00ff88; /* Neon Green */
            --warning: #ffcc00; /* Neon Yellow */
            --danger: #ff4444; /* Neon Red */
            --grid-px: 75vmin; 
            --grid-size: 5;
            --gold: #ffd700;
        }

        * { 
            touch-action: manipulation; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg); 
            color: var(--text);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0; 
            /* Strict 2% Blank Space at Top and Bottom */
            padding: 2vh 0; 
            box-sizing: border-box; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            height: 100vh;
        }
        /* Leaderboard Styling */
.leaderboard-modal {
    background: rgba(15, 15, 26, 0.95);
    border: 2px solid var(--accent);
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 0 30px rgba(0, 255, 136, 0.2);
}

.rank-item {
    display: flex;
    justify-content: space-between;
    padding: 12px;
    margin: 4px 0;
    background: var(--card-bg);
    border-radius: 8px;
}

.rank-1 { border-left: 4px solid var(--gold); color: var(--gold); }

        /* --- View Control --- */
        .view { 
            display: none; 
            width: 100%; 
            flex-grow: 1; 
            padding: 10px; 
            text-align: center; 
            flex-direction: column; 
            align-items: center; 
            /* Use flex-start to ensure top content (legend/title) is never cut off */
            justify-content: flex-start; 
            overflow-y: auto;
            overflow-x: hidden;
        }
        .view.active { display: flex; }

        /* --- Modern UI Components --- */
        .ui-card {
            width: 95%;
            max-width: 450px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 15px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            margin-bottom: 12px;
            flex-shrink: 0; /* Prevents card from shrinking on small screens */
        }

        .rule-card { 
            background: rgba(0, 0, 0, 0.3); 
            border-left: 4px solid var(--accent); 
            padding: 12px; 
            margin: 8px 0; 
            text-align: left; 
            font-size: 0.9rem; 
            border-radius: 4px;
        }

        /* --- Legend Badges --- */
        .badge-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin: 10px 0;
        }

        .badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* --- Grid System --- */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(var(--grid-size), 1fr);
            grid-template-rows: repeat(var(--grid-size), 1fr);
            gap: 6px;
            width: var(--grid-px);
            height: var(--grid-px);
            background: rgba(0, 0, 0, 0.4); 
            padding: 10px; 
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        .cell {
            background: rgba(255, 255, 255, 0.08); 
            border-radius: 8px;
            display: flex; 
            justify-content: center; 
            align-items: center;
            font-size: calc(var(--grid-px) / var(--grid-size) * 0.6);
            aspect-ratio: 1 / 1;
            user-select: none;
            transition: all 0.2s ease;
        }

        /* --- Visual Feedback & Outlines --- */
        .path-correct { 
            border: 3px solid var(--accent) !important; 
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.4);
            background: rgba(0, 255, 136, 0.1) !important;
        }
        .path-mismatch { 
            border: 3px solid var(--warning) !important; 
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.4);
            background: rgba(255, 204, 0, 0.1) !important;
        }
        .path-wrong { 
            border: 3px solid var(--danger) !important; 
            box-shadow: 0 0 15px rgba(255, 68, 68, 0.4);
            background: rgba(255, 68, 68, 0.1) !important;
        }

        .hit-effect { background: #FFF !important; transform: scale(1.1); }
        .grid-zoom-focus { transition: transform 0.6s ease-in-out; transform: scale(2.2); z-index: 10; }

        /* --- Buttons --- */
        button { 
            background: var(--accent); 
            color: #001a11; 
            border: none; 
            padding: 12px 24px; 
            font-size: 1rem; 
            font-weight: 800; 
            border-radius: 12px; 
            cursor: pointer;
            box-shadow: 0 4px 0 #009e54;
            transition: transform 0.1s;
        }
        button:active { transform: translateY(2px); box-shadow: 0 2px 0 #009e54; }
        .btn-sm { padding: 6px 14px; font-size: 0.8rem; box-shadow: none; }
        .btn-delete { background: var(--danger); color: white; box-shadow: 0 4px 0 #990000; }

        /* --- Animations --- */
        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .cage-effect { font-size: 1.5rem; animation: pulse 0.4s infinite; }

/* --- Game 2 Outline Styles (Fixed Visibility) --- */
        .path-correct { border: 4px solid #4CAF50 !important; background: rgba(76, 175, 80, 0.1) !important; }   /* Green */
        .path-mismatch { border: 4px solid #FFCC00 !important; background: rgba(255, 204, 0, 0.1) !important; } /* Yellow */
        .path-wrong { border: 4px solid #F44336 !important; background: rgba(244, 67, 54, 0.1) !important; }    /* Red */

        /* Remove solid backgrounds that cover outlines */
        .correct { /* Keep empty or add scaling effect */ transform: scale(1.02); }
        .wrong { /* Keep empty to allow outlines to show */ }

.rank-card {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--card-bg);
    padding: 12px 20px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.05);
}
.top-1 { border-left: 5px solid #FFD700; background: rgba(255, 215, 0, 0.1); }
.top-2 { border-left: 5px solid #C0C0C0; background: rgba(192, 192, 192, 0.1); }
.top-3 { border-left: 5px solid #CD7F32; background: rgba(205, 127, 50, 0.1); }
.rank-number { font-weight: 800; width: 30px; }

    </style>
</head>
<body>

<span id="current-name-display" style="display:none;"></span>

<section id="view-profile" class="view active">
    <div style="width: 100%; display: flex; justify-content: flex-end; padding: 10px 20px; flex-shrink: 0;">
        <button onclick="toggleLanguage()" class="btn-sm" style="margin:0;">ZH / EN</button>
    </div>

    <h2 class="lang" data-zh="鼠鼠訓練營" data-en="Mouse Academy">鼠鼠訓練營</h2>
    
    <div style="width: 90%; max-width: 400px; display: flex; flex-direction: column; gap: 10px;">
        <div class="rule-card" style="margin: 0; border-left-color: #FFCC00;">
            <strong class="lang" data-zh="⚡ 遊戲一：捕鼠特攻" data-en="⚡ Game 1: Rat Catcher">⚡ 遊戲一：捕鼠特攻</strong><br>
            <span class="lang" data-zh="當 🐀 出現時立即點擊！避開其他小動物。限時內捉到🐀越多越高分。" data-en="Tap 🐀 instantly! Avoid other animals. It gets faster!">當 🐀 出現時立即點擊！避開其他小動物。限時內捉到🐀越多越高分。</span>
        </div>
        
        <div class="rule-card" style="margin: 0; border-left-color: #4CAF50;">
            <strong class="lang" data-zh="🧠 遊戲二：老鼠迷蹤" data-en="🧠 Game 2: Mouse Maze">🧠 遊戲二：老鼠迷蹤</strong><br>
            <span class="lang" data-zh="記住 🐀 走過的路徑，等牠消失後，依序點擊格子還原逃走路線。" data-en="Watch the path of 🐀. Tap the cells in order after it vanishes.">記住 🐀 走過的路徑，等牠消失後，依序點擊格子還原逃走路線。</span>
        </div>
    </div>
    <button onclick="openHallOfFame()" style="background:none; border:1px solid var(--accent); color:var(--accent); padding: 8px 20px; font-size: 0.9rem; margin-top: 10px;">
    🏆 <span class="lang" data-zh="查看榮譽榜" data-en="View Rankings">查看榮譽榜</span>
    </button>

    <button id="main-start-btn" onclick="showUserSelection()" style="width: 80%; max-width: 300px; margin-top: 25px; padding: 20px; font-size: 1.5rem; box-shadow: 0 0 15px var(--accent);">
        🚀 <span class="lang" data-zh="開始訓練" data-en="Start Training">開始訓練</span>
    </button>

    <div id="user-selection-area" style="display: none; width: 100%; flex-direction: column; align-items: center; animation: pulse 0.3s;">
        <div style="margin-top: 20px; color: var(--accent); font-weight: bold;">
            <span class="lang" data-zh="請選擇或新增學員" data-en="Select or Add Player">請選擇或新增學員</span>
        </div>
        
        <div id="user-list-container" style="width: 100%; margin-top: 10px; display: flex; flex-direction: column; align-items: center; overflow-y: auto; max-height: 25vh;">
            </div>

        <div style="margin-top: 10px; background: #111; padding: 12px; border-radius: 15px; border: 1px dashed #555; flex-shrink: 0;">
            <input type="text" id="name-input" placeholder="Name..." style="padding: 10px; font-size: 1rem; width: 120px; border-radius: 8px; border: none; background: #222; color: #fff;">
            <button onclick="handleCreateUser()" class="lang" data-zh="新增" data-en="Add">新增</button>
        </div>
    </div>
</section>


<div id="game-picker-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); backdrop-filter:blur(10px); z-index:2000; flex-direction:column; align-items:center; justify-content:center; gap:15px;">
    <h3 class="lang" data-zh="請選擇訓練項目" data-en="Select Training">請選擇訓練項目</h3>
    <button onclick="pickGame(1)" style="width: 80%; max-width: 280px; padding: 25px; font-size: 1.4rem; margin-bottom: 15px;">⚡ 捕鼠特攻</button>
    <button onclick="pickGame(2)" style="width: 80%; max-width: 280px; padding: 25px; font-size: 1.4rem; background: #4CAF50; color: #fff;">🧠 老鼠迷蹤</button>
    <button onclick="closePicker()" style="background:none; color:#999; text-decoration:underline; margin-top:20px;">取消 / Cancel</button>
</div>

<div id="g2-retry-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; flex-direction:column; align-items:center; justify-content:center; text-align:center;">
    <div style="background:#222; padding:30px; border-radius:20px; border:2px solid #4CAF50; width:85%; max-width:320px;">
        <h3 id="g2-retry-msg" class="lang" data-zh="出錯了！" data-en="Wrong move!">出錯了！</h3>
        <p class="lang" data-zh="扣減一個心心繼續遊戲？" data-en="Use 1 heart to retry?">扣減一個心心繼續遊戲？</p>
        <div style="font-size: 2rem; margin: 15px 0;" id="g2-modal-lives">❤️❤️❤️</div>
        <button onclick="handleG2Retry(true)" style="width:100%; background:#4CAF50; color:white; margin-bottom:10px;">是 / Yes</button>
        <button onclick="handleG2Retry(false)" style="width:100%; background:#555; color:white;">否 / No</button>
    </div>
</div>

<section id="view-leaderboard" class="view">
    <div style="width: 100%; display: flex; justify-content: space-between; padding: 10px 20px;">
        <button onclick="showView('profile')" class="btn-sm" style="background:#444; color:#fff;">⬅️ <span class="lang" data-zh="返回" data-en="Back">返回</span></button>
        <h2 class="lang" data-zh="🏆 榮譽榜" data-en="🏆 Hall of Fame" style="margin:0; color:var(--accent);">🏆 榮譽榜</h2>
    </div>

    <div style="display: flex; gap: 10px; margin-bottom: 20px;">
        <button id="rank-tab-g1" onclick="renderLeaderboard(1)" class="btn-sm" style="flex:1;">⚡ Catch</button>
        <button id="rank-tab-g2" onclick="renderLeaderboard(2)" class="btn-sm" style="flex:1; background:#444;">🧠 Maze</button>
    </div>

    <div id="leaderboard-list" style="width: 95%; max-width: 400px; display: flex; flex-direction: column; gap: 8px;">
        </div>
</section>


<section id="view-game1" class="view">
    <div style="width: 95%; background: #1A1A1A; border: 2px solid var(--accent); padding: 12px; border-radius: 12px; margin-bottom: 10px;">
        <div class="lang" data-zh="⚡ 捉到 🐀 加 10 分，其他扣 5 分！" data-en="⚡ 🐀 +10 pts, Others -5 pts!" style="font-size: 1.4rem; font-weight: bold; color: var(--accent); line-height: 1.2;">
            ⚡ 捉到 🐀 加 10 分，其他扣 5 分！
        </div>
        
        <div style="margin: 8px 0; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 1.1rem; color: #4CAF50;">
            <input type="checkbox" id="g1-elderly-chk" style="width: 20px; height: 20px;">
            <label for="g1-elderly-chk">🐢 長輩模式 (速度較慢)</label>
        </div>

        <div style="display: flex; justify-content: space-between; margin-top: 5px; font-size: 1.2rem; font-weight: bold;">
            <span style="color: #FF4444;">⏱️ <span id="g1-timer">45</span>s</span>
            <span>🏆 Best: <span id="g1-best">0</span></span>
            <span style="color: #FFFF00;">⭐ <span id="g1-score">0</span></span>
        </div>
    </div>
    


    <div id="g1-grid" class="game-grid"></div>

    <div style="width: 95%; margin-top: 10px; background: #111; padding: 8px; border-radius: 10px; min-height: 100px; text-align: left; border: 1px solid #333;">
        <div style="font-size: 0.85rem; color: #888;">CATCHED / 捕獲 🐀:</div>
        <div id="g1-collection-mice" style="font-size: 1.4rem; min-height: 1.6rem; margin-bottom: 5px; word-break: break-all;"></div>
        <div style="font-size: 0.85rem; color: #888;">MISS / 誤點:</div>
        <div id="g1-collection-others" style="font-size: 1.4rem; min-height: 1.6rem; opacity: 0.5; word-break: break-all;"></div>
    </div>

    <button onclick="quitGame()" style="margin-top: 8px; background: #222; color: #888; font-size: 0.9rem;">放棄結束 / Quit</button>
</section>



<section id="view-game2" class="view">
    <div class="ui-card">
        <h2 style="color: var(--accent); margin: 0 0 8px 0; font-size: 1.3rem; text-shadow: 0 0 10px rgba(0,255,136,0.4);" 
            class="lang" data-zh="👉 送老鼠去吃芝士 🧀" data-en="👉 Help Mouse Get Cheese 🧀">
            👉 送老鼠去吃芝士 🧀
        </h2>
        
        <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 10px;">
            <div class="badge" style="border: 1px solid #00ff88;">
                <div style="width:10px; height:10px; background:#00ff88; border-radius:2px;"></div>
                <span class="lang" data-zh="正確" data-en="Correct">正確</span>
            </div>
            <div class="badge" style="border: 1px solid #ffcc00;">
                <div style="width:10px; height:10px; background:#ffcc00; border-radius:2px;"></div>
                <span class="lang" data-zh="順序錯" data-en="Order">順序錯</span>
            </div>
            <div class="badge" style="border: 1px solid #ff4444;">
                <div style="width:10px; height:10px; background:#ff4444; border-radius:2px;"></div>
                <span class="lang" data-zh="錯誤" data-en="Wrong">錯誤</span>
            </div>
        </div>

        <div id="g2-hint" style="color: #00d1ff; font-weight: bold; font-size: 0.95rem; margin-bottom: 8px;">🧀 Loading...</div>

        <div style="display: flex; justify-content: space-between; align-items: center; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 8px;">
    <div style="font-size: 0.9rem; color: #fff; display: flex; gap: 15px;">
        <div>
            <span class="lang" data-zh="關卡:" data-en="Level:">關卡:</span> 
            <span id="g2-level-display" style="color: var(--accent); font-weight: bold;">1</span>
        </div>
        <div>
            <span class="lang" data-zh="步數:" data-en="Steps:">步數:</span> 
            <span id="g2-total-steps" style="color: var(--accent); font-weight: bold;">0</span>
        </div>
    </div>
    <div id="g2-lives-display" style="font-size: 1.1rem; letter-spacing: 2px;">❤️❤️❤️❤️❤️</div>
</div>
    </div>

    <div id="g2-grid" class="game-grid"></div>

    <div style="margin-top: 12px; display: flex; align-items: center; gap: 15px; background: rgba(0,0,0,0.4); padding: 8px 15px; border-radius: 20px;">
        <span style="font-size: 0.8rem; color: #aaa;" class="lang" data-zh="速度" data-en="Speed">速度</span>
        <input type="range" id="g2-speed-range" min="200" max="1100" value="600" style="width: 100px; accent-color: var(--accent);">
        <button onclick="quitGame()" style="background: none; border: 1px solid #444; color: #888; border-radius: 6px; padding: 2px 10px; font-size: 0.8rem;">Exit</button>
    </div>
</section>

<script>
/* --- 核心邏輯與用戶管理 --- */
let appState = { lang: 'zh', users: JSON.parse(localStorage.getItem('mouse_final_v16') || '[]'), g1Active: false, currentUserId: null };// Add this to track who is playing

const decoys = ['🐹', '🐰', '🐥', '🐱', '🐶'];

function toggleLanguage() {
    appState.lang = appState.lang === 'zh' ? 'en' : 'zh';
    document.querySelectorAll('.lang').forEach(el => { el.innerText = el.getAttribute(`data-${appState.lang}`); });
}

function showView(id) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(`view-${id}`).classList.add('active');
    appState.g1Active = (id === 'game1');
    
    // Reset selection area when returning to profile
    if (id === 'profile') {
        document.getElementById('user-selection-area').style.display = 'none';
        document.getElementById('main-start-btn').style.display = 'block';
    }
}

function showUserSelection() {
    document.getElementById('main-start-btn').style.display = 'none';
    document.getElementById('user-selection-area').style.display = 'flex';
    refreshUserList();
}

function refreshUserList() {
    const container = document.getElementById('user-list-container');
    if (appState.users.length === 0) {
        container.innerHTML = `<div style="color:#666; margin:10px;" class="lang" data-zh="目前沒有學員" data-en="No users found">目前沒有學員</div>`;
        return;
    }
    container.innerHTML = appState.users.map((u, i) => `
        <div class="profile-item">
            <span style="font-weight:bold; font-size:1.1rem; color:#FFF;">👤 ${u.name}</span>
            <div>
                <button onclick="editUser(${i})" class="btn-sm btn-edit">✏️</button>
                <button onclick="deleteUser(${i})" class="btn-sm btn-delete">🗑️</button>
                <button onclick="openPicker(${i})" class="btn-sm" style="background:#FFCC00; color:#000;">▶️ GO 進入遊戲</button>
            </div>
        </div>
    `).join('');
    // Re-apply language translation to new elements
    document.querySelectorAll('.lang').forEach(el => { el.innerText = el.getAttribute(`data-${appState.lang}`); });
}

function handleCreateUser() {
    const input = document.getElementById('name-input');
    if (!input.value.trim()) return;
    // Add g2Steps: 0 to the initial object
    appState.users.push({ name: input.value.trim(), g1Best: 0, g2Level: 1, g2Steps: 0 });
    saveAndRefresh();
    input.value = '';
}

function editUser(i) {
    const n = prompt("修改名字 / Edit Name:", appState.users[i].name);
    if (n && n.trim()) { appState.users[i].name = n.trim(); saveAndRefresh(); }
}

function deleteUser(i) {
    if (confirm("確定刪除？ Delete?")) { appState.users.splice(i, 1); saveAndRefresh(); }
}

function saveAndRefresh() {
    localStorage.setItem('mouse_final_v16', JSON.stringify(appState.users));
    refreshUserList();
}

/* --- 彈窗選擇 --- */
function openPicker(i) {
    appState.currentUserId=i; // Remember which user was clicked
    document.getElementById('current-name-display').innerText = appState.users[i].name;
    document.getElementById('game-picker-modal').style.display = 'flex';
}
function closePicker() { document.getElementById('game-picker-modal').style.display = 'none'; }
function pickGame(n) { closePicker(); n === 1 ? initGame1() : initGame2(); }

/* --- 🛠️ 遊戲 1：45秒進階邏輯 --- */
let g1Data = { 
    score: 0, 
    gridSize: 5, 
    timer: null, 
    timeLeft: 45, // 設定為 45 秒
    gameClock: null,
    historyMice: "",
    historyOthers: ""
};

/* --- 🛠️ 修正後的 Game 1 啟動邏輯 --- */
async function initGame1() {
    // A. 數據與 UI 重置
    g1Data.score = 0;
    g1Data.gridSize = 5;
    g1Data.historyMice = "";
    g1Data.historyOthers = "";
    
    const currentName = document.getElementById('current-name-display').innerText;
    const currentUser = appState.users.find(u => u.name === currentName);
    document.getElementById('g1-best').innerText = currentUser?.g1Best || 0;
    
    document.getElementById('g1-score').innerText = "0";
    document.getElementById('g1-collection-mice').innerText = "";
    document.getElementById('g1-collection-others').innerText = "";

    // B. 設定時間模式（處理 180s 或 45s）
    const isElderlyMode = document.getElementById('g1-elderly-chk')?.checked;
    g1Data.timeLeft = isElderlyMode ? 180 : 45;
    document.getElementById('g1-timer').innerText = g1Data.timeLeft;
    
    // C. 切換視圖
    showView('game1');
    
    // D. 執行 3, 2, 1 倒數
    const grid = document.getElementById('g1-grid');
    grid.innerHTML = ''; 
    
    const startMsg = isElderlyMode ? "180秒內捉老鼠" : "45秒內捉老鼠";

    grid.innerHTML = `<div style="grid-column: 1/-1; grid-row: 1/-1; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: var(--accent); font-weight: bold; text-align: center;">${startMsg}</div>`;
    await new Promise(r => setTimeout(r, 1200));

    const countdowns = ['3', '2', '1', 'GO!'];
    for (let s of countdowns) {
        grid.innerHTML = `<div style="grid-column: 1/-1; grid-row: 1/-1; display: flex; align-items: center; justify-content: center; font-size: 5rem; color: var(--accent); font-weight: bold; animation: pulse 0.5s;">${s}</div>`;
        await new Promise(r => setTimeout(r, 800));
    }

    // E. 正式開始
    startG1Clock();
    runG1Cycle();
}


function startG1Clock() {
    clearInterval(g1Data.gameClock);
    g1Data.gameClock = setInterval(() => {
        g1Data.timeLeft--;
        document.getElementById('g1-timer').innerText = g1Data.timeLeft;
        if (g1Data.timeLeft <= 0) endGame1();
    }, 1000);
}

function runG1Cycle() {
    if (!appState.g1Active) return;
    clearTimeout(g1Data.timer);
    
    const grid = document.getElementById('g1-grid');
    document.documentElement.style.setProperty('--grid-size', g1Data.gridSize);
    grid.innerHTML = '';

    // [新增] 建立網格與點擊事件邏輯 (保持原樣)
    for (let i=0; i<g1Data.gridSize**2; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.onclick = (e) => {
            e.preventDefault();
            if (!cell.innerText) return;
            if (cell.innerText === '🐀') {
                cell.classList.add('hit-effect');
                g1Data.score += 10;
                g1Data.historyMice += '🐀';
                document.getElementById('g1-collection-mice').innerText = g1Data.historyMice;
                if (g1Data.score > 0 && g1Data.score % 100 === 0 && g1Data.gridSize < 8) g1Data.gridSize++;
                document.getElementById('g1-score').innerText = g1Data.score;
                clearTimeout(g1Data.timer); 
                setTimeout(runG1Cycle, 150);
            } else {
                g1Data.score = Math.max(0, g1Data.score - 5);
                g1Data.historyOthers += cell.innerText;
                document.getElementById('g1-collection-others').innerText = g1Data.historyOthers;
                document.getElementById('g1-score').innerText = g1Data.score;
                cell.classList.add('wrong');
                setTimeout(() => cell.classList.remove('wrong'), 200);
            }
        };
        grid.appendChild(cell);
    }

    // [新增] 放置老鼠與干擾物邏輯 (保持原樣)
    const cells = grid.querySelectorAll('.cell');
    cells[Math.floor(Math.random() * cells.length)].innerText = '🐀';
    let decoyCount = Math.floor((g1Data.gridSize ** 2) * 0.4); // 建議調回 0.4 較平衡
    for(let d=0; d < decoyCount; d++){
        let idx = Math.floor(Math.random() * cells.length);
        if(cells[idx].innerText === '') {
            cells[idx].innerText = decoys[Math.floor(Math.random() * decoys.length)];
        }
    }

    // --- [關鍵修改處] ---
    [span_3](start_span)// 1. 安全讀取 Checkbox 狀態，避免 null 報錯[span_3](end_span)
    const elderlyBtn = document.getElementById('g1-elderly-chk');
    const isElderly = elderlyBtn ? elderlyBtn.checked : false; 

    [span_4](start_span)// 2. 根據模式計算消失速度：長輩模式 5 秒，正常模式 0.85 ~ 2 秒[span_4](end_span)
    let delay = isElderly ? 5000 : Math.max(850, 2000 - (g1Data.gridSize * 150));

    [span_5](start_span)// 3. 設定下一次循環[span_5](end_span)
    g1Data.timer = setTimeout(() => { 
        if (appState.g1Active) runG1Cycle(); 
    }, delay);
}


function endGame1() {
    appState.g1Active = false;
    clearInterval(g1Data.gameClock);
    clearTimeout(g1Data.timer);
    
    const currentName = document.getElementById('current-name-display').innerText;
    const userIdx = appState.users.findIndex(u => u.name === currentName);
    
    let isNewRecord = false;
    if (userIdx !== -1) {
        if (!appState.users[userIdx].g1Best || g1Data.score > appState.users[userIdx].g1Best) {
            appState.users[userIdx].g1Best = g1Data.score;
            isNewRecord = true;
        }
    }
    
    saveAndRefresh(); // 確保數據存入 localStorage
    
    alert(isNewRecord ? `🎊 新紀錄！總分: ${g1Data.score}` : `遊戲結束！得分: ${g1Data.score}`);
    showView('profile');
}



/* --- 🛠️ 遊戲 2：芝士提示版核心邏輯 --- */
let g2Data = { 
    level: 1, size: 5, path: [], playerIdx: 0, 
    isShowing: false, currentLevelId: 0,
    totalSteps: 0, cheesePos: "",
    lives: 3 // Track hearts
};

function initGame2() {
    const user = appState.users[appState.currentUserId];
    
    // Load progress from user profile
    g2Data.level = user.g2Level || 1;
    g2Data.totalSteps = user.g2Steps || 0; // Load saved steps
    
    // Calculate correct grid size based on level (increases every 3 levels)
    g2Data.size = 5 + Math.floor(g2Data.level / 3);
    if (g2Data.size > 8) g2Data.size = 8;
    
    g2Data.currentLevelId = 0;
    g2Data.lives = 5; 

    // Update UI
    document.getElementById('g2-total-steps').innerText = g2Data.totalSteps;
    document.getElementById('g2-level-display').innerText = g2Data.level;
    
    showView('game2');
    startG2Level();
}

async function startG2Level() {
    const myLevelId = ++g2Data.currentLevelId;
    g2Data.playerIdx = 0;
    g2Data.isShowing = true;
    
    const grid = document.getElementById('g2-grid');
    document.documentElement.style.setProperty('--grid-size', g2Data.size);
    grid.innerHTML = '';
    document.getElementById('g2-lives-display').innerText = "❤️".repeat(g2Data.lives) || "";

    // 建立網格
    for (let i=0; i<g2Data.size**2; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.dataset.pos = `${Math.floor(i/g2Data.size)}-${i%g2Data.size}`;
        grid.appendChild(cell);
    }

    // 1. 生成隨機路徑
    g2Data.path = ["0-0"];
    let curr = {x:0, y:0};
    const pathLength = g2Data.level + 2;
    for (let s=0; s < pathLength; s++) {
        let n = [{x:curr.x+1, y:curr.y}, {x:curr.x-1, y:curr.y}, {x:curr.x, y:curr.y+1}, {x:curr.x, y:curr.y-1}]
                .filter(p => p.x>=0 && p.x<g2Data.size && p.y>=0 && p.y<g2Data.size && !g2Data.path.includes(`${p.x}-${p.y}`));
        if (n.length === 0) break;
        curr = n[Math.floor(Math.random()*n.length)];
        g2Data.path.push(`${curr.x}-${curr.y}`);
    }

    // 2. 放置芝士 (尋找最後一格旁邊的空位)
    const last = curr;
    let neighbors = [{x:last.x+1, y:last.y}, {x:last.x-1, y:last.y}, {x:last.x, y:last.y+1}, {x:last.x, y:last.y-1}]
                    .filter(p => p.x>=0 && p.x<g2Data.size && p.y>=0 && p.y<g2Data.size && !g2Data.path.includes(`${p.x}-${p.y}`));
    
    // 如果旁邊沒空位，就選最後一格路徑作為芝士位 (保底機制)
    let cPos = neighbors.length > 0 ? neighbors[0] : last;
    g2Data.cheesePos = `${cPos.x}-${cPos.y}`;
    const cheeseCell = grid.querySelector(`[data-pos="${g2Data.cheesePos}"]`);
    cheeseCell.innerText = '🧀'; // 芝士先行出現

    // 3. 播放老鼠走動 (速度由 Bar 控制)
    const speed = 1300 - document.getElementById('g2-speed-range').value;
    document.getElementById('g2-hint').innerText = "👀 記住路線...";
    
    for (let p of g2Data.path) {
        if (myLevelId !== g2Data.currentLevelId) return;
        let t = grid.querySelector(`[data-pos="${p}"]`);
        if(t && p !== g2Data.cheesePos) {
            t.innerText = '🐀';
            await new Promise(r => setTimeout(r, speed));
            t.innerText = '';
        }
    }

    document.getElementById('g2-hint').innerText = "👉 送老鼠去吃芝士！";
    g2Data.isShowing = false;

  // 4. Click Logic with Proximity Check & Fixed Heart Deduction
   // 4. Revised Click Logic: Outline Colors & No Cross Emoji
    document.querySelectorAll('#g2-grid .cell').forEach(c => {
        c.onclick = async () => {
            if (g2Data.isShowing) return;
            const pos = c.dataset.pos;
            const [clickX, clickY] = pos.split('-').map(Number);

            let lastPos = g2Data.playerIdx === 0 ? "0-0" : g2Data.path[g2Data.playerIdx - 1];
            const [lastX, lastY] = lastPos.split('-').map(Number);
            const dist = Math.abs(clickX - lastX) + Math.abs(clickY - lastY);
            
            if (dist > 1 && pos !== g2Data.cheesePos) {
                const msg = appState.lang === 'zh' ? "鼠鼠不能跑太遠" : "The mouse cannot jump too far";
                alert(msg);
                return;
            }
            
            if (pos === g2Data.path[g2Data.playerIdx]) {
                // CORRECT STEP - Green Outline & Mouse Icon
                c.classList.add('path-correct');
                c.innerText = '🐀'; // Changed from 🐾 to 🐀 per request
                c.classList.add('correct');
                g2Data.playerIdx++;
                g2Data.totalSteps++;
                document.getElementById('g2-total-steps').innerText = g2Data.totalSteps;

                if (g2Data.playerIdx === g2Data.path.length) {
                    g2Data.isShowing = true;
                    document.getElementById('g2-hint').innerText = appState.lang === 'zh' ? "😋 成功吃到了！" : "😋 Yummy!";
                    cheeseCell.innerText = '😋';
                    
                    // SAVE PROGRESS TO USER PROFILE
                    g2Data.level++;
                    const user = appState.users[appState.currentUserId];
                    user.g2Level = g2Data.level;
                    user.g2Steps = g2Data.totalSteps; // Save the cumulative steps
                    saveAndRefresh();

                    setTimeout(() => {
                        // Increase size every 3 levels
                        if (g2Data.level % 3 === 0 && g2Data.size < 8) g2Data.size++;
                        
                        // Update the level display in the UI
                        document.getElementById('g2-level-display').innerText = g2Data.level;
                        
                        if (myLevelId === g2Data.currentLevelId) startG2Level();
                    }, 800);
                }
            } else if (pos !== g2Data.cheesePos) {
                // WRONG CLICK - Yellow or Red Outline
                g2Data.isShowing = true; 
                
                // Assign persistent outlines
                if (g2Data.path.includes(pos)) {
                    c.classList.add('path-mismatch'); 
                } else {
                    c.classList.add('path-wrong');    
                }
                
                c.classList.add('wrong');
                const livesDisplay = document.getElementById('g2-lives-display');

                grid.classList.add('grid-zoom-focus');
                grid.style.transformOrigin = `${(c.offsetLeft + c.offsetWidth/2)}px ${(c.offsetTop + c.offsetHeight/2)}px`;
                c.innerHTML = '<div class="cage-effect">🕸️<br>🐀</div>';

                if (g2Data.lives > 0) {
                    g2Data.lives--;
                    setTimeout(() => {
                        livesDisplay.innerText = "❤️".repeat(g2Data.lives) || "";
                        grid.classList.remove('grid-zoom-focus');
                        
                        // FIX: Remove cage icon but KEEP the outline classes
                        c.innerHTML = ''; 
                        c.classList.remove('wrong'); // Remove the animation class only
                        g2Data.isShowing = false;
                    }, 1200);
                } else {
                    setTimeout(() => {
                        livesDisplay.innerText = ""; 
                        grid.classList.remove('grid-zoom-focus');
                        showG2RetryModal(); 
                    }, 1200);
                }
            }
        };
    });
}

function showG2RetryModal() {
    const penalty = Math.floor(g2Data.totalSteps * 0.3);
    const msg = `心心已用完！\n要扣除 30% 分數 (${penalty} 步) 換取一個心心繼續嗎？`;
    
    // confirm() bypasses the retry selection box
    if (confirm(msg)) {
        g2Data.totalSteps -= penalty;
        g2Data.lives = 1; 
        
        // Update UI displays
        document.getElementById('g2-total-steps').innerText = g2Data.totalSteps;
        document.getElementById('g2-lives-display').innerText = "❤️"; 
        
        // Resume directly
        g2Data.isShowing = false; 
    } else {
        alert(`遊戲結束！總步數: ${g2Data.totalSteps}`);
        quitGame();
    }
}

function handleG2Retry(useHeart) {
    document.getElementById('g2-retry-modal').style.display = 'none';
    if (useHeart && g2Data.lives > 0) {
        g2Data.lives--;
        document.getElementById('g2-lives-display').innerText = "❤️".repeat(g2Data.lives) || "💔";
        // Rollback: Clear only the wrong visual, keep playerIdx the same
        document.querySelectorAll('#g2-grid .cell.wrong').forEach(el => el.classList.remove('wrong'));
        g2Data.isShowing = false;
    } else {
        alert(`遊戲結束！總步數: ${g2Data.totalSteps}`);
        quitGame();
    }
}




// 修改 quitGame 確保完全切斷 Game 2 的非同步鏈
function quitGame() {
    appState.g1Active = false;
    g2Data.currentLevelId++; // 強制讓任何背景中的 startG2Level 失效
    clearTimeout(g1Data.timer);
    clearInterval(g1Data.gameClock);
    showView('profile');
}

function showLeaderboard(gameType) {
    // gameType 1: Catch Mouse (Sort by g1Best)
    // gameType 2: Maze (Sort by g2Level)
    
    let sortedUsers = [...appState.users].sort((a, b) => {
        if (gameType === 1) return (b.g1Best || 0) - (a.g1Best || 0);
        return (b.g2Level || 1) - (a.g2Level || 1);
    }).slice(0, 10); // Get Top 10

    let html = sortedUsers.map((u, i) => `
        <div class="rank-item ${i < 3 ? 'rank-' + (i+1) : ''}">
            <span>${i + 1}. ${u.name}</span>
            <span>${gameType === 1 ? u.g1Best + ' pts' : 'Lv.' + u.g2Level}</span>
        </div>
    `).join('');

    document.getElementById('leaderboard-content').innerHTML = html;
    document.getElementById('leaderboard-view').style.display = 'flex';
}

function renderLeaderboard(gameNum) {
    const list = document.getElementById('leaderboard-list');
    const tab1 = document.getElementById('rank-tab-g1');
    const tab2 = document.getElementById('rank-tab-g2');

    // Update Tab UI
    tab1.style.background = gameNum === 1 ? 'var(--accent)' : '#444';
    tab2.style.background = gameNum === 2 ? '#4CAF50' : '#444';

    // Sort Users
    let sorted = [...appState.users].sort((a, b) => {
        if (gameNum === 1) return (b.g1Best || 0) - (a.g1Best || 0);
        return (b.g2Level || 1) - (a.g2Level || 1);
    }).slice(0, 10); // Top 10 only

    list.innerHTML = sorted.map((u, i) => `
        <div class="rank-card ${i < 3 ? 'top-' + (i + 1) : ''}">
            <div style="display:flex; align-items:center;">
                <span class="rank-number">${i + 1}</span>
                <span style="font-weight:bold;">${u.name}</span>
            </div>
            <span style="color:var(--accent); font-weight:bold;">
                ${gameNum === 1 ? (u.g1Best || 0) + ' pts' : 'Lv.' + (u.g2Level || 1)}
            </span>
        </div>
    `).join('');
}

// Helper to open the view
function openHallOfFame() {
    showView('leaderboard');
    renderLeaderboard(1); // Default to Game 1
}


window.onload = () => { refreshUserList(); };
</script>
