<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>鼠鼠大作戰 - 專業長者版</title>
    <style>
        :root {
            --bg: #000;
            --text: #FFFF00;
            --accent: #FFCC00;
            --grid-size: 5;
            --grid-px: 450px;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'PingFang HK', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header { width: 100%; padding: 15px; background: #222; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        .view { display: none; width: 95%; max-width: 600px; padding: 20px; text-align: center; box-sizing: border-box; }
        .view.active { display: block; }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(var(--grid-size), 1fr);
            grid-template-rows: repeat(var(--grid-size), 1fr);
            gap: 6px; width: var(--grid-px); height: var(--grid-px);
            margin: 20px auto; background: #222; padding: 10px; border-radius: 10px;
        }

        .cell {
            background: #333; border-radius: 8px; display: flex; justify-content: center; align-items: center;
            cursor: pointer; font-size: calc(var(--grid-px) / var(--grid-size) * 0.65);
        }

        .cell.correct { background: #4CAF50 !important; }
        .cell.wrong { background: #F44336 !important; }
        @keyframes hitZoom { 0% { transform: scale(1); } 50% { transform: scale(2.2); background: #FFF; color: #000; } 100% { transform: scale(1); } }
        .hit-effect { animation: hitZoom 0.4s forwards; }

        button { background: var(--accent); color: #000; border: none; padding: 15px 25px; font-size: 1.4rem; font-weight: bold; border-radius: 12px; margin: 10px; cursor: pointer; }
        .profile-item { background: #1A1A1A; border: 2px solid var(--accent); padding: 15px; margin: 10px 0; border-radius: 10px; font-size: 1.5rem; }
        .rule-box { text-align: left; background: #111; padding: 20px; border-radius: 12px; border-left: 6px solid var(--accent); line-height: 1.6; margin: 15px 0; font-size: 1.2rem; }
        .config-panel { background: #222; padding: 20px; border-radius: 12px; margin: 15px 0; }
        .hearts { font-size: 2.2rem; color: #ff4444; }
    </style>
</head>
<body>

<header>
    <div id="top-user-name">👤 <span id="current-name-display">---</span></div>
    <button onclick="toggleLanguage()" style="font-size: 0.9rem;">ZH/EN</button>
</header>

<section id="view-profile" class="view active">
    <h1>鼠鼠訓練營</h1>
    <div id="user-list-container"></div>
    <input type="text" id="name-input" placeholder="New Name" style="font-size: 1.4rem; padding: 10px; width: 60%;">
    <button onclick="handleCreateUser()">新增</button>
</section>

<section id="view-lobby" class="view">
    <h2 class="lang" data-zh="請選擇訓練項目" data-en="Select Training">請選擇訓練項目</h2>
    <button onclick="showConfig(1)" style="width: 85%;">⚡ <span class="lang" data-zh="捕鼠特攻" data-en="Rat Catcher">捕鼠特攻</span></button>
    <button onclick="showConfig(2)" style="width: 85%;">🧠 <span class="lang" data-zh="老鼠迷蹤" data-en="Mouse Maze">老鼠迷蹤</span></button>
</section>

<section id="view-config" class="view">
    <h2 id="config-title">遊戲設定</h2>
    <div class="rule-box" id="config-rules"></div>
    
    <div class="config-panel">
        <label style="font-size: 1.5rem; cursor: pointer; display: block; margin-bottom: 15px;">
            <input type="checkbox" id="elderly-mode-chk" style="transform: scale(2); margin-right: 15px;">
            <span class="lang" data-zh="開啟長者模式" data-en="Elderly Mode On">開啟長者模式</span>
        </label>
        
        <div id="speed-ctrl-container">
            <label class="lang" data-zh="路徑顯示速度" data-en="Path Speed">路徑顯示速度</label><br>
            <input type="range" id="speed-range" min="300" max="1500" value="800" step="100">
        </div>
    </div>
    
    <button onclick="startGame()" class="lang" data-zh="開始遊戲" data-en="Start Game">開始遊戲</button>
    <button onclick="showView('lobby')" style="background: #444; color: #fff;">Back</button>
</section>

<section id="view-game1" class="view">
    <div style="font-size: 2rem;">Score: <span id="g1-score">0</span></div>
    <div id="g1-grid" class="game-grid"></div>
    <button onclick="quitGame()">Exit</button>
</section>

<section id="view-game2" class="view">
    <div id="g2-lives-display" class="hearts">❤️❤️❤️</div>
    <div id="g2-level-info" style="font-size: 1.2rem;">Level 1</div>
    <div id="g2-grid" class="game-grid"></div>
    <button onclick="quitGame()">Exit</button>
</section>

<script>
let appState = {
    lang: 'zh',
    users: JSON.parse(localStorage.getItem('mouse_final_v5') || '[]'),
    activeGame: 0,
    g1Active: false
};

function showView(id) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(`view-${id}`).classList.add('active');
    appState.g1Active = (id === 'game1');
}

function toggleLanguage() {
    appState.lang = appState.lang === 'zh' ? 'en' : 'zh';
    document.querySelectorAll('.lang').forEach(el => { el.innerText = el.getAttribute(`data-${appState.lang}`); });
}

/* --- 用戶邏輯 --- */
function refreshUserList() {
    const container = document.getElementById('user-list-container');
    container.innerHTML = appState.users.map((u, i) => `<div class="profile-item" onclick="selectUser(${i})">👤 ${u.name}</div>`).join('');
}
function handleCreateUser() {
    const input = document.getElementById('name-input');
    if (!input.value) return;
    appState.users.push({ name: input.value });
    localStorage.setItem('mouse_final_v5', JSON.stringify(appState.users));
    input.value = ''; refreshUserList();
}
function selectUser(i) {
    document.getElementById('current-name-display').innerText = appState.users[i].name;
    showView('lobby');
}

/* --- 設定頁邏輯 --- */
function showConfig(gameNum) {
    appState.activeGame = gameNum;
    document.getElementById('config-title').innerText = gameNum === 1 ? "捕鼠特攻" : "老鼠迷蹤";
    document.getElementById('config-rules').innerText = gameNum === 1 
        ? "只點擊老鼠 🐀，忽視其他動物。長者模式下時間延長至 10 秒。"
        : "記住老鼠走過的路徑。點錯時可在原位重試。";
    document.getElementById('speed-ctrl-container').style.display = gameNum === 2 ? "block" : "none";
    showView('config');
}

function startGame() {
    if (appState.activeGame === 1) initGame1(); else initGame2();
}

/* --- Game 1: 捕鼠特攻 (多元干擾) --- */
let g1Data = { score: 0, gridSize: 5, timer: null };
const decoys = ['🐹', '🐰', '🐥', '🐱', '🐶'];

function initGame1() {
    g1Data.score = 0; g1Data.gridSize = 5;
    showView('game1'); runG1Cycle();
}
function runG1Cycle() {
    if (!appState.g1Active) return;
    const grid = document.getElementById('g1-grid');
    grid.style.setProperty('--grid-size', g1Data.gridSize);
    grid.innerHTML = '';
    
    for (let i=0; i<g1Data.gridSize**2; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.onclick = () => {
            if (cell.innerText === '🐀') {
                cell.classList.add('hit-effect'); g1Data.score += 10;
                if (g1Data.score % 100 === 0 && g1Data.gridSize < 10) g1Data.gridSize++;
                document.getElementById('g1-score').innerText = g1Data.score;
                clearTimeout(g1Data.timer); setTimeout(runG1Cycle, 400);
            }
        };
        grid.appendChild(cell);
    }
    const cells = grid.querySelectorAll('.cell');
    cells[Math.floor(Math.random() * cells.length)].innerText = '🐀';
    
    // 干擾項
    let decoyCount = Math.floor(g1Data.gridSize * 1.2);
    for(let d=0; d<decoyCount; d++) {
        let idx = Math.floor(Math.random() * cells.length);
        if(cells[idx].innerText === '') cells[idx].innerText = decoys[Math.floor(Math.random()*decoys.length)];
    }

    let delay = document.getElementById('elderly-mode-chk').checked ? 10000 : 1500 - (g1Data.gridSize * 100);
    g1Data.timer = setTimeout(() => { if (appState.g1Active) runG1Cycle(); }, Math.max(700, delay));
}

/* --- Game 2: 老鼠迷蹤 (動態重試) --- */
let g2Data = { level: 1, size: 5, lives: 3, path: [], playerIdx: 0 };
function initGame2() {
    g2Data.level = 1; g2Data.size = 5;
    showView('game2'); startG2Level();
}
async function startG2Level() {
    g2Data.playerIdx = 0;
    const isElderly = document.getElementById('elderly-mode-chk').checked;
    const speed = parseInt(document.getElementById('speed-range').value);

    // 生命計算
    let routeLen = g2Data.level + 3;
    g2Data.lives = isElderly ? (g2Data.size**2) : Math.max(2, Math.floor(routeLen * 0.2));

    const grid = document.getElementById('g2-grid');
    grid.style.setProperty('--grid-size', g2Data.size);
    grid.innerHTML = '';
    document.getElementById('g2-lives-display').innerText = isElderly ? "♾️" : "❤️".repeat(Math.min(g2Data.lives, 8));
    document.getElementById('g2-level-info').innerText = `Level ${g2Data.level} (Retries: ${g2Data.lives})`;

    for (let i=0; i<g2Data.size**2; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.dataset.pos = `${Math.floor(i/g2Data.size)}-${i%g2Data.size}`;
        grid.appendChild(cell);
    }

    g2Data.path = ["0-0"];
    let curr = {x:0, y:0};
    for (let s=0; s<routeLen; s++) {
        let n = [{x:curr.x+1, y:curr.y}, {x:curr.x-1, y:curr.y}, {x:curr.x, y:curr.y+1}, {x:curr.x, y:curr.y-1}]
                .filter(p => p.x>=0 && p.x<g2Data.size && p.y>=0 && p.y<g2Data.size && !g2Data.path.includes(`${p.x}-${p.y}`));
        if (n.length === 0) break;
        curr = n[Math.floor(Math.random()*n.length)];
        g2Data.path.push(`${curr.x}-${curr.y}`);
    }

    for (let p of g2Data.path) {
        let target = grid.querySelector(`[data-pos="${p}"]`);
        target.innerText = '🐀'; await new Promise(r => setTimeout(r, speed)); target.innerText = '';
    }
    setupG2Input();
}

function setupG2Input() {
    document.querySelectorAll('#g2-grid .cell').forEach(c => {
        c.onclick = () => {
            if (c.dataset.pos === g2Data.path[g2Data.playerIdx]) {
                c.innerText = '🐀'; c.classList.add('correct'); g2Data.playerIdx++;
                if (g2Data.playerIdx === g2Data.path.length) {
                    g2Data.level++; if (g2Data.level % 3 === 0 && g2Data.size < 10) g2Data.size++;
                    setTimeout(startG2Level, 800);
                }
            } else {
                g2Data.lives--; c.classList.add('wrong');
                document.getElementById('g2-lives-display').innerText = g2Data.lives > 15 ? "♾️" : "❤️".repeat(Math.max(0, g2Data.lives));
                setTimeout(() => { c.classList.remove('wrong'); if (g2Data.lives <= 0) startG2Level(); }, 400);
            }
        };
    });
}

function quitGame() { appState.g1Active = false; clearTimeout(g1Data.timer); showView('lobby'); }
window.onload = () => { refreshUserList(); toggleLanguage(); };
</script>
</body>
</html>
